<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PIED · Precificação Solar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1b2024; --ink-soft:#454e57; --muted:#878d96;
    --paper:#f3f4ef; --surface:#ffffff; --surface-2:#fafbf7;
    --line:#e4e6df; --line-strong:#cfd2c9;
    --amber:#f2a31c; --amber-deep:#cf7d06; --amber-wash:#fdf3df;
    --teal:#0f8a6a; --teal-wash:#e4f3ee;
    --red:#d6453f; --red-wash:#fbeae9;
    --indigo:#3a4a8c;
    --shadow:0 1px 2px rgba(27,32,36,.05),0 8px 24px rgba(27,32,36,.07);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;
    color:var(--ink);background:var(--paper);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
  }
  .num{font-variant-numeric:tabular-nums}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit;font-size:14px}

  /* ---------- Top bar ---------- */
  header.topbar{
    position:sticky;top:0;z-index:30;
    background:var(--ink);color:#f6f7f3;
    border-bottom:3px solid var(--amber);
  }
  .topbar-inner{
    max-width:1280px;margin:0 auto;padding:0 20px;
    display:flex;align-items:center;gap:24px;height:60px;
  }
  .brand{display:flex;align-items:center;gap:11px;font-family:"Space Grotesk";font-weight:700;letter-spacing:-.01em}
  .brand .sun{
    width:26px;height:26px;border-radius:50%;flex:none;position:relative;
    background:radial-gradient(circle at 50% 50%,var(--amber) 0 46%,transparent 52%);
  }
  .brand .sun::before{
    content:"";position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(from 0deg,var(--amber) 0 8%,transparent 8% 16.5%,var(--amber) 16.5% 24.5%,transparent 24.5% 33%,var(--amber) 33% 41%,transparent 41% 50%,var(--amber) 50% 58%,transparent 58% 66.5%,var(--amber) 66.5% 74.5%,transparent 74.5% 83%,var(--amber) 83% 91%,transparent 91%);
    -webkit-mask:radial-gradient(circle,transparent 56%,#000 58%);
            mask:radial-gradient(circle,transparent 56%,#000 58%);
  }
  .brand b{font-size:16px}
  .brand span{font-weight:500;color:#aeb4ac;font-size:12px;letter-spacing:.02em}
  .tabs{display:flex;gap:2px;margin-left:6px}
  .tab{
    appearance:none;border:0;background:transparent;color:#b9beb6;
    padding:8px 14px;border-radius:8px;font-weight:600;font-size:13.5px;
    display:flex;align-items:center;gap:7px;transition:background .15s,color .15s;
  }
  .tab .ct{font-size:11px;background:#2b323a;color:#aeb4ac;padding:1px 7px;border-radius:20px;font-variant-numeric:tabular-nums}
  .tab:hover{color:#fff;background:#262d35}
  .tab[aria-selected="true"]{background:var(--amber);color:#241a06}
  .tab[aria-selected="true"] .ct{background:rgba(0,0,0,.16);color:#3a2c08}
  .spacer{flex:1}
  .session{display:flex;align-items:center;gap:10px}
  .who{font-size:12.5px;color:#cdd1ca;display:flex;align-items:center;gap:7px}
  .who .dot{width:8px;height:8px;border-radius:50%;background:var(--teal)}
  .btn{
    border:1px solid transparent;border-radius:9px;padding:8px 14px;font-weight:600;font-size:13px;
    background:var(--amber);color:#241a06;transition:filter .15s,background .15s,border-color .15s;
  }
  .btn:hover{filter:brightness(1.04)}
  .btn.ghost{background:transparent;border-color:#3a424b;color:#dfe2db}
  .btn.ghost:hover{background:#262d35;filter:none}
  .btn.small{padding:6px 11px;font-size:12.5px}
  .btn:disabled{opacity:.5;cursor:not-allowed;filter:none}

  /* ---------- Mode banner ---------- */
  .banner{
    max-width:1280px;margin:0 auto;padding:9px 20px;font-size:12.5px;
    display:flex;align-items:center;gap:9px;color:var(--ink-soft);
  }
  .banner.demo{background:var(--amber-wash);border-bottom:1px solid #f0e2c2;color:#7a5a07}
  .banner.live{background:var(--teal-wash);border-bottom:1px solid #cfe7df;color:#0c6a52}
  .banner .pill{font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-size:10.5px;padding:2px 8px;border-radius:5px;background:rgba(0,0,0,.07)}

  /* ---------- Layout ---------- */
  main{max-width:1280px;margin:0 auto;padding:18px 20px 80px}
  .toolbar{
    display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;
  }
  .search{position:relative;flex:1;min-width:230px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .search input{
    width:100%;padding:10px 12px 10px 36px;border:1px solid var(--line-strong);
    border-radius:10px;background:var(--surface);transition:border-color .15s,box-shadow .15s;
  }
  .search input:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-wash)}
  .filterbox{
    display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--line-strong);border-radius:10px;padding:0 4px 0 12px;height:42px;
  }
  .filterbox label{font-size:12px;color:var(--muted);font-weight:600}
  .filterbox select{border:0;background:transparent;padding:10px 8px;font-weight:600;color:var(--ink)}
  .filterbox select:focus{outline:0}
  .count{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}

  /* ---------- Table ---------- */
  .tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .scroller{overflow:auto;max-height:calc(100vh - 250px)}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13.5px}
  thead th{
    position:sticky;top:0;z-index:2;background:var(--surface-2);
    text-align:left;font-weight:600;color:var(--ink-soft);font-size:11.5px;
    text-transform:uppercase;letter-spacing:.04em;
    padding:11px 14px;border-bottom:1px solid var(--line-strong);white-space:nowrap;
  }
  th.r,td.r{text-align:right}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:0}
  .code{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .pname{font-weight:600;color:var(--ink);max-width:360px}
  .pname small{display:block;font-weight:500;color:var(--muted);font-size:11.5px;margin-top:1px}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#eef0ea;color:var(--ink-soft);white-space:nowrap}
  .chip.grp{background:#eaf0fb;color:#33457f}
  td .price{font-weight:700;font-variant-numeric:tabular-nums}
  td .calc{color:var(--ink)}
  .flag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600}
  .flag .b{width:7px;height:7px;border-radius:50%}
  .flag.ok .b{background:var(--teal)} .flag.ok{color:var(--teal)}
  .flag.warn .b{background:var(--amber-deep)} .flag.warn{color:var(--amber-deep)}
  .flag.bad .b{background:var(--red)} .flag.bad{color:var(--red)}
  .empty{padding:48px;text-align:center;color:var(--muted)}

  /* ---------- Drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,24,28,.42);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(460px,94vw);
    background:var(--surface);box-shadow:-12px 0 40px rgba(20,24,28,.18);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.22,.61,.36,1);
    z-index:41;display:flex;flex-direction:column;
  }
  .drawer.open{transform:translateX(0)}
  #drawerInner{display:flex;flex-direction:column;height:100%;min-height:0}
  .drawer header{padding:18px 22px 14px;border-bottom:1px solid var(--line);position:relative;flex:0 0 auto}
  .drawer .close{position:absolute;top:14px;right:16px;border:0;background:#f0f1ec;width:30px;height:30px;border-radius:8px;color:var(--ink-soft);font-size:16px;line-height:1}
  .drawer .close:hover{background:#e6e8e0}
  .drawer h2{font-family:"Space Grotesk";font-size:17px;margin:0 30px 6px 0;line-height:1.25}
  .drawer .sub{font-size:12.5px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .drawer .body{padding:18px 22px;overflow-y:auto;overflow-x:hidden;flex:1 1 0;min-height:0;scrollbar-gutter:stable}
  .drawer .body::-webkit-scrollbar{width:10px}
  .drawer .body::-webkit-scrollbar-thumb{background:#d3d6ce;border-radius:8px;border:2px solid var(--surface)}
  .drawer .body::-webkit-scrollbar-thumb:hover{background:#bcc0b6}

  .readout{
    background:linear-gradient(180deg,#fffdf8,#fdf6e7);
    border:1px solid #f0e2bf;border-radius:12px;padding:16px 18px;margin-bottom:18px;
  }
  .readout .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#9a7a2a;font-weight:700}
  .readout .big{font-family:"JetBrains Mono";font-weight:700;font-size:30px;color:var(--ink);letter-spacing:-.02em;margin-top:2px;transition:color .15s}
  .readout .row2{display:flex;justify-content:space-between;gap:14px;margin-top:12px;border-top:1px dashed #ecd9ad;padding-top:11px}
  .readout .mini .lbl{color:#a98a3e}
  .readout .mini b{font-family:"JetBrains Mono";font-size:14px;display:block;margin-top:1px}

  .health{margin:4px 0 18px}
  .health .track{height:8px;border-radius:6px;background:#eceee7;overflow:hidden;position:relative}
  .health .fill{height:100%;border-radius:6px;transition:width .25s,background .25s}
  .health .line{display:flex;justify-content:space-between;font-size:11.5px;margin-top:7px}

  .fieldset{display:flex;flex-direction:column;gap:13px;margin-bottom:8px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft)}
  .field .inwrap{position:relative;display:flex;align-items:center}
  .field .pfx{position:absolute;left:11px;color:var(--muted);font-size:13px;font-weight:600}
  .field input{
    width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:9px;
    background:var(--surface);font-variant-numeric:tabular-nums;transition:border-color .15s,box-shadow .15s;
  }
  .field input.haspfx{padding-left:34px}
  .field input:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-wash)}
  .field input:disabled{background:#f5f6f1;color:var(--muted)}
  .hint{font-size:11.5px;color:var(--muted)}
  .lockmsg{
    display:flex;gap:10px;align-items:center;background:var(--surface-2);border:1px dashed var(--line-strong);
    border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;
  }
  .actions{display:flex;gap:10px;margin-top:16px}
  .actions .btn{flex:1;justify-content:center;display:flex}
  .btn.primary{background:var(--amber);color:#241a06}
  .btn.solid-dark{background:var(--ink);color:#f6f7f3}
  .btn.outline{background:transparent;border:1px solid var(--line-strong);color:var(--ink-soft)}
  .btn.outline:hover{background:var(--surface-2);filter:none}
  .btn.outline.dup{width:100%;justify-content:center;display:flex;margin-top:10px}

  .hist{margin-top:24px}
  .hist h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 12px;font-weight:700}
  .hentry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .hentry:last-child{border-bottom:0}
  .hentry .tl{width:8px;flex:none;display:flex;flex-direction:column;align-items:center;padding-top:4px}
  .hentry .tl .d{width:8px;height:8px;border-radius:50%;background:var(--amber)}
  .hentry .tl .ln{flex:1;width:2px;background:var(--line)}
  .hentry .ct{flex:1;font-size:12.5px}
  .hentry .ch{font-weight:600}
  .hentry .ch .from{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1px}
  .hentry .ch .to{color:var(--ink)}
  .hentry .meta{color:var(--muted);font-size:11.5px;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .hempty{font-size:12.5px;color:var(--muted);font-style:italic}

  /* ---------- Modal (login) ---------- */
  .modal-scrim{position:fixed;inset:0;background:rgba(20,24,28,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal-scrim.open{display:flex}
  .modal{background:var(--surface);border-radius:16px;width:min(380px,100%);box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal.modal-lg{width:min(620px,100%)}
  .modal.modal-lg .mb{max-height:min(74vh,640px);overflow:auto}
  .npgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:4px 0 8px}
  .npgrid .field{margin-bottom:0}
  .npgrid .field.full{grid-column:1 / -1}
  .npgrid .field input,.npgrid .field select{width:100%;padding:9px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface);font-family:inherit}
  .npgrid .field .inwrap input.haspfx{padding-left:32px}
  .npgrid .field .inwrap{position:relative;display:flex;align-items:center}
  .npgrid .field .pfx,.npgrid .field .sfx{position:absolute;color:var(--muted);font-size:13px;font-weight:600}
  .npgrid .field .pfx{left:11px}.npgrid .field .sfx{right:12px}
  .npgrid .field input:focus,.npgrid .field select:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-wash)}
  .npgrid label .req{color:var(--red);margin-left:2px}
  @media (max-width:560px){ .npgrid{grid-template-columns:1fr} }
  .modal .mh{padding:20px 22px 4px;display:flex;align-items:center;gap:10px}
  .modal .mh .sun{width:22px;height:22px;border-radius:50%;background:var(--amber);flex:none}
  .modal .mh h2{font-family:"Space Grotesk";font-size:17px;margin:0}
  .modal .mb{padding:8px 22px 22px}
  .modal p.lead{font-size:13px;color:var(--ink-soft);margin:6px 0 16px}
  .modal .field{margin-bottom:13px}
  .modal .err{background:var(--red-wash);color:#9c2a26;font-size:12.5px;padding:9px 12px;border-radius:8px;margin-bottom:13px;display:none}
  .modal .err.show{display:block}
  .modal .mactions{display:flex;gap:10px;margin-top:6px}
  .modal .mactions .btn{flex:1;display:flex;justify-content:center}
  select.userpick{width:100%;padding:10px 12px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface)}
  select.userpick:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-wash)}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);opacity:0;
    background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:80;transition:opacity .2s,transform .2s;pointer-events:none;
    display:flex;align-items:center;gap:9px;max-width:90vw;
  }
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .toast .ic{width:18px;height:18px;flex:none}
  .toast.ok{background:#14503f}.toast.err{background:#7c241f}

  .loader{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted)}
  .spin{width:18px;height:18px;border:2px solid var(--line-strong);border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ---------- Tab especial: Últimas alterações ---------- */
  .tabsep{width:1px;align-self:center;height:22px;background:#363d45;margin:0 4px}
  .tab.feed[aria-selected="true"]{background:#2b323a;color:#fff;box-shadow:inset 0 0 0 1px var(--amber)}
  .tab.feed[aria-selected="true"] .ct{background:var(--amber);color:#241a06}

  /* ---------- Feed de alterações ---------- */
  .feedwrap{padding:6px 0}
  .daygroup{padding:0}
  .dayhead{
    position:sticky;top:0;z-index:1;background:var(--surface);
    display:flex;align-items:baseline;gap:10px;padding:13px 18px 9px;
    border-bottom:1px solid var(--line);
  }
  .dayhead .d{font-family:"Space Grotesk";font-weight:600;font-size:13.5px;color:var(--ink);text-transform:capitalize}
  .dayhead .c{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .fitem{display:flex;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line);transition:background .12s}
  .fitem:hover{background:var(--surface-2)}
  .fitem .time{flex:none;width:48px;text-align:right;font-family:"JetBrains Mono";font-size:12px;color:var(--muted);padding-top:2px}
  .fitem .col{flex:1;min-width:0}
  .fitem .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
  .fitem .prod{font-weight:600;color:var(--ink);cursor:pointer}
  .fitem .prod:hover{text-decoration:underline;text-decoration-color:var(--amber)}
  .secchip{font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:2px 7px;border-radius:5px;white-space:nowrap;display:inline-block}
  .secchip.inv{background:#eaf0fb;color:#33457f}
  .secchip.mod{background:#e9f4ec;color:#256b41}
  .secchip.mis{background:#f3eef9;color:#5b3f86}
  .fitem .fcode{font-family:"JetBrains Mono";font-size:11px;color:var(--muted)}
  .change{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px}
  .change .field{font-weight:600;color:var(--ink-soft)}
  .change .from{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1px;font-variant-numeric:tabular-nums}
  .change .arrow{color:var(--muted)}
  .change .to{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .delta{font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;font-variant-numeric:tabular-nums}
  .delta.up{background:var(--red-wash);color:#a5332e}
  .delta.down{background:var(--teal-wash);color:#0c6a52}
  .fitem .by{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px}
  .fitem .by .av{width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .venda-res{margin-top:6px;display:inline-flex;align-items:center;gap:7px;font-size:12px;color:#8a6a12;background:var(--amber-wash);border:1px solid #f0e2c2;padding:3px 10px;border-radius:7px}
  .venda-res b{font-family:"JetBrains Mono";color:var(--ink);font-variant-numeric:tabular-nums;font-size:13px}

  /* ---------- Disponibilidade (ocultar/reexibir) ---------- */
  .chip.hid{background:var(--red-wash);color:#a5332e}
  .visblock{margin-top:16px;border:1px solid var(--line);border-radius:11px;padding:14px 15px;background:var(--surface-2)}
  .visblock.hid{background:var(--red-wash);border-color:#f0d3d1}
  .visblock .vishead{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;margin-bottom:10px}
  .visblock.hid .vishead{color:#a5332e}
  .visblock .vismeta{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}
  .visrow{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .motivosel{flex:1;min-width:150px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface);font-weight:500;color:var(--ink)}
  .motivosel:focus{outline:0;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-wash)}
  .btn.outline-danger{background:transparent;border:1px solid #e2b6b3;color:#a5332e}
  .btn.outline-danger:hover{background:var(--red-wash);filter:none}
  .visblock.hid #btnShow{margin-top:2px}

  /* ---------- Controles de data + botões extras ---------- */
  .ctl{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;padding:0 10px;height:42px}
  .ctl label{font-size:12px;color:var(--muted);font-weight:600}
  .ctl select,.ctl input{border:0;background:transparent;padding:9px 4px;font-weight:600;color:var(--ink)}
  .ctl input[type=date]{font-weight:500;color:var(--ink-soft)}
  .ctl select:focus,.ctl input:focus{outline:0}

  #printArea{display:none}

    body{background:#fff!important}

    #printArea{display:block !important}

  }

  #printArea .rc{font-size:11px;color:#6a7079}
  #printArea .repmeta{text-align:right;font-size:10px;color:#454e57}
  #printArea .repmeta span{color:#9098a1}
  #printArea h1{font-size:17px;margin:4px 0 10px}
  #printArea .repfilters{display:flex;gap:22px;flex-wrap:wrap;background:#f6f7f3;border:1px solid #e4e6df;border-radius:8px;padding:9px 14px;margin-bottom:8px}
  #printArea .repfilters span{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#9098a1;font-weight:700}
  #printArea .repfilters b{font-size:12.5px}
  #printArea .repsum{font-size:10.5px;color:#454e57;margin-bottom:12px}
  #printArea .repsum b{color:#1b2024}
  #printArea table{width:100%;border-collapse:collapse;font-size:9.5px}
  #printArea thead{display:table-header-group}
  #printArea thead th{background:#1b2024;color:#fff;text-align:left;padding:6px 7px;font-size:9px;text-transform:uppercase;letter-spacing:.03em;border:0}
  #printArea thead th.r{text-align:right}
  #printArea tbody td{border-bottom:1px solid #e4e6df;padding:5px 7px;vertical-align:top}
  #printArea tbody tr:nth-child(even){background:#f7f8f4}
  #printArea tbody tr{break-inside:avoid}
  #printArea td.r{text-align:right}
  #printArea td.nb{white-space:nowrap}
  #printArea td.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
  #printArea td.prodc{font-weight:600;max-width:230px}
  #printArea td.vend{color:#9a6a12;font-weight:700}
  #printArea td.up{color:#a5332e}
  #printArea td.down{color:#0c6a52}
  #printArea .repfoot{margin-top:14px;padding-top:8px;border-top:1px solid #e4e6df;font-size:8.5px;color:#9098a1}

    .topbar-inner{height:auto;flex-wrap:wrap;padding:10px 14px;gap:12px}
    .tabs{order:3;width:100%;overflow:auto}
    main{padding:14px}
    .pname{max-width:200px}
    .hide-sm{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

/* ---------------- utils ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const brl = n => (n==null||isNaN(n)) ? "—" : n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const pct = n => (n==null||isNaN(n)) ? "—" : (n*100).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+"%";
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function vendaCalc(custo,margem){ if(custo==null||margem==null) return null; if(margem>=1) return null; return custo/(1-margem)/(1-CONFIG.PIS_COFINS); }
function margemReal(custo,preco){ if(!custo||!preco) return null; return 1-(custo/(preco*(1-CONFIG.PIS_COFINS))); }
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); if(isNaN(d)) return iso;
  return d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }

/* ---------------- API (Apps Script ou demo) ---------------- */
const API = {
  async load(){
    if(!CONFIG.API_URL){ // demo
      state.data = JSON.parse(JSON.stringify({
        inversores:SEED.inversores, modulos:SEED.modulos, miscelaneas:SEED.miscelaneas
      }));
      // garante campos de histórico
      Object.values(state.data).flat().forEach(it=>{ it.historico=it.historico||[]; });
      SEED.usuarios = SEED.usuarios || [{nome:"Demonstração",pin:"0000"}];
      return;
    }
    const r = await fetch(CONFIG.API_URL+"?action=data");
    const j = await r.json();
    if(!j.ok) throw new Error(j.error||"Falha ao carregar dados");
    state.data = j.data; SEED.usuarios = j.usuarios||[];
    CONFIG.PIS_COFINS = j.pisCofins ?? CONFIG.PIS_COFINS;
  },
  async login(nome,pin){
    if(!CONFIG.API_URL){ // demo: aceita PIN 0000 ou qualquer usuário do seed
      const u=(SEED.usuarios||[]).find(u=>u.nome===nome);
      if(u && String(u.pin)===String(pin)) return {ok:true,nome};
      if(pin==="0000") return {ok:true,nome};
      return {ok:false,error:"PIN incorreto (demo: use 0000)."};
    }
    const r=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"login",nome,pin})});
    return await r.json();
  },
  async updateCost(payload){ // {secao,codigo,custo,margem,valorPlataforma}
    const body={...payload,action:"updateCost",nome:state.user.nome,pin:state.pin};
    if(!CONFIG.API_URL){ // demo: aplica localmente + registra histórico
      const it=state.data[payload.secao].find(x=>String(x.codigo)===String(payload.codigo));
      const now=new Date().toISOString();
      const changes=[];
      [["custo","custo"],["margem","margem"],["valorPlataforma","valorPlataforma"]].forEach(([k])=>{
        if(payload[k]!=null && Number(payload[k])!==Number(it[k])){
          changes.push({campo:k,de:it[k],para:Number(payload[k])});
        }
      });
      if(changes.length){
        it.custoAnterior=it.custo; it.dataAlteracao=now; it.alteradoPor=state.user.nome;
        changes.forEach(c=>{ it[c.campo]=c.para; });
        it.historico=it.historico||[];
        changes.forEach(c=> it.historico.unshift({dataHora:now,usuario:state.user.nome,campo:c.campo,de:c.de,para:c.para}));
      }
      return {ok:true,item:it};
    }
    const r=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
    return await r.json();
  },
  async setHidden(payload){ // {secao,codigo,oculto,motivo}
    const body={...payload,action:"setHidden",nome:state.user.nome,pin:state.pin};
    if(!CONFIG.API_URL){ // demo
      const it=state.data[payload.secao].find(x=>String(x.codigo)===String(payload.codigo));
      it.oculto=!!payload.oculto;
      if(it.oculto){ it.ocultadoPor=state.user.nome; it.dataOcultacao=new Date().toISOString(); it.motivoOcultacao=payload.motivo||""; }
      else { it.ocultadoPor=null; it.dataOcultacao=null; it.motivoOcultacao=""; }
      return {ok:true,item:it};
    }
    const r=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
    return await r.json();
  },
  async createProduct(payload){ // {secao, produto}
    const body={...payload,action:"createProduct",nome:state.user.nome,pin:state.pin};
    if(!CONFIG.API_URL){ // demo
      const it={...payload.produto, historico:[], oculto:false, ocultadoPor:null, dataOcultacao:null, motivoOcultacao:""};
      return {ok:true,item:it};
    }
    const r=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
    return await r.json();
  }
};

/* ---------------- agregação de alterações ---------------- */
const SECMETA={inversores:{label:"Inversores",cls:"inv",f:"Inversores"},modulos:{label:"Módulos",cls:"mod",f:"Módulos"},miscelaneas:{label:"Miscelâneas",cls:"mis",f:"Miscelâneas"}};
function itemChanges(secao,it){
  const hist=(it.historico||[]);
  if(!hist.length) return [];
  const nome=it.modelo||it.nome||"";
  // ordena do mais antigo p/ o mais novo e refaz o estado em cada ponto
  const asc=hist.slice().sort((a,b)=>String(a.dataHora||"").localeCompare(String(b.dataHora||"")));
  const running={custo:it.custo,margem:it.margem,valorPlataforma:it.valorPlataforma};
  ["custo","margem","valorPlataforma"].forEach(f=>{ const first=asc.find(h=>h.campo===f); if(first) running[f]=first.de; });
  const out=[];
  asc.forEach(h=>{
    if(h.campo in running) running[h.campo]=h.para;
    out.push({dataHora:h.dataHora,usuario:h.usuario,campo:h.campo,de:h.de,para:h.para,secao,codigo:it.codigo,produto:nome,
              vendaResultante:vendaCalc(running.custo,running.margem)});
  });
  return out;
}
function allChanges(){
  const list=[];
  Object.keys(SECMETA).forEach(secao=>{ (state.data[secao]||[]).forEach(it=>{ itemChanges(secao,it).forEach(c=>list.push(c)); }); });
  list.sort((a,b)=>String(b.dataHora||"").localeCompare(String(a.dataHora||"")));
  return list;
}
function inRange(iso){
  if(!state.dateFrom && !state.dateTo) return true;
  const t=new Date(iso).getTime(); if(isNaN(t)) return false;
  if(state.dateFrom && t < new Date(state.dateFrom+"T00:00:00").getTime()) return false;
  if(state.dateTo && t > new Date(state.dateTo+"T23:59:59.999").getTime()) return false;
  return true;
}
function filteredChanges(){
  const q=state.query.trim().toLowerCase();
  const showAll=state.filter==="Todas"||state.filter==="Todos";
  return allChanges().filter(c=>{
    if(!showAll && SECMETA[c.secao].f!==state.filter) return false;
    if(!inRange(c.dataHora)) return false;
    if(q){ const hay=(c.produto+" "+(c.usuario||"")+" "+(c.codigo||"")).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
}
function dayLabel(iso){
  const d=new Date(iso); if(isNaN(d)) return "Sem data";
  const today=new Date(), y=new Date(); y.setDate(today.getDate()-1);
  const same=(a,b)=>a.toDateString()===b.toDateString();
  if(same(d,today)) return "Hoje";
  if(same(d,y)) return "Ontem";
  return d.toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
}
function fmtTime(iso){ const d=new Date(iso); return isNaN(d)?"—":d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}); }
const CAMPO_LBL={custo:"Custo",margem:"Margem",valorPlataforma:"Preço plataforma"};
function fmtVal(campo,v){ return campo==="margem"?pct(v):brl(v); }
function deltaBadge(campo,de,para){
  if(de==null||para==null||isNaN(de)||isNaN(para)) return "";
  if(campo==="margem"){
    const dpp=(para-de)*100; if(Math.abs(dpp)<0.05) return "";
    const up=dpp>0; return `<span class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(dpp).toLocaleString("pt-BR",{maximumFractionDigits:1})} p.p.</span>`;
  }
  if(de===0) return "";
  const pctv=(para-de)/Math.abs(de)*100; if(Math.abs(pctv)<0.05) return "";
  const up=pctv>0; return `<span class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pctv).toLocaleString("pt-BR",{maximumFractionDigits:1})}%</span>`;
}
function initials(nome){ return String(nome||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase()||"?"; }

/* ---------------- relatório PDF (impressão nativa do navegador) ---------------- */
function fmtDateBR(ymd){ if(!ymd) return ""; const [y,m,d]=ymd.split("-"); return `${d}/${m}/${y}`; }
function fmtDateTimeBR(iso){ const d=new Date(iso); return isNaN(d)?"—":d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function deltaText(campo,de,para){
  if(de==null||para==null||isNaN(de)||isNaN(para)) return "—";
  if(campo==="margem"){ const dpp=(para-de)*100; if(Math.abs(dpp)<0.05) return "—"; return (dpp>0?"+":"-")+Math.abs(dpp).toLocaleString("pt-BR",{maximumFractionDigits:1})+" p.p."; }
  if(de===0) return "—";
  const p=(para-de)/Math.abs(de)*100; if(Math.abs(p)<0.05) return "—"; return (p>0?"+":"-")+Math.abs(p).toLocaleString("pt-BR",{maximumFractionDigits:1})+"%";
}

function buildReportHtml(list){
  const pf=state.dateFrom?fmtDateBR(state.dateFrom):null, pt=state.dateTo?fmtDateBR(state.dateTo):null;
  const periodo = pf&&pt? `${pf} a ${pt}` : pf? `A partir de ${pf}` : pt? `Até ${pt}` : "Todo o histórico";
  const secaoTxt = (state.filter==="Todas"||state.filter==="Todos")?"Todas":state.filter;
  const buscaTxt = state.query.trim()? `"${esc(state.query.trim())}"` : "—";
  const geradoEm = new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const geradoPor = state.user? esc(state.user.nome) : "—";

  // resumo
  const porSecao={inversores:0,modulos:0,miscelaneas:0}, porCampo={custo:0,margem:0,valorPlataforma:0};
  list.forEach(c=>{ porSecao[c.secao]++; if(c.campo in porCampo) porCampo[c.campo]++; });

  const linhas=list.map((c,i)=>{
    const vendaTxt=(c.campo==='custo'||c.campo==='margem')&&c.vendaResultante!=null? brl(c.vendaResultante):"—";
    const dt=deltaText(c.campo,c.de,c.para);
    const dCls=dt.startsWith("+")?"up":dt.startsWith("-")?"down":"";
    return `<tr>
      <td>${i+1}</td>
      <td class="nb">${fmtDateTimeBR(c.dataHora)}</td>
      <td>${SECMETA[c.secao].label}</td>
      <td class="mono">${esc(c.codigo)||"—"}</td>
      <td class="prodc">${esc(c.produto)}</td>
      <td>${CAMPO_LBL[c.campo]||c.campo}</td>
      <td class="r mono">${fmtVal(c.campo,c.de)}</td>
      <td class="r mono"><b>${fmtVal(c.campo,c.para)}</b></td>
      <td class="r mono ${dCls}">${dt}</td>
      <td class="r mono vend">${vendaTxt}</td>
      <td>${esc(c.usuario||"—")}</td></tr>`;
  }).join("");

  return `<div class="rep">
    <div class="rephead">
      <div class="repbrand"><span class="rsun"></span>
        <div><div class="rt">PIED · Precificação Solar</div><div class="rc">Suno Distribuidora Solar</div></div></div>
      <div class="repmeta">
        <div><span>Gerado em</span> ${geradoEm}</div>
        <div><span>Gerado por</span> ${geradoPor}</div>
      </div>
    </div>
    <h1>Relatório de Alterações de Preço</h1>
    <div class="repfilters">
      <div><span>Período</span><b>${periodo}</b></div>
      <div><span>Seção</span><b>${secaoTxt}</b></div>
      <div><span>Busca</span><b>${buscaTxt}</b></div>
      <div><span>Total de alterações</span><b>${list.length}</b></div>
    </div>
    <div class="repsum">
      Por seção: Inversores <b>${porSecao.inversores}</b> · Módulos <b>${porSecao.modulos}</b> · Miscelâneas <b>${porSecao.miscelaneas}</b>
      &nbsp;|&nbsp; Por tipo: Custo <b>${porCampo.custo}</b> · Margem <b>${porCampo.margem}</b> · Preço plataforma <b>${porCampo.valorPlataforma}</b>
    </div>
    <table>
      <thead><tr>
        <th>#</th><th>Data / hora</th><th>Seção</th><th>Código</th><th>Produto</th><th>Campo</th>
        <th class="r">Anterior</th><th class="r">Novo</th><th class="r">Variação</th><th class="r">Novo preço venda</th><th>Usuário</th>
      </tr></thead>
      <tbody>${linhas}</tbody>
    </table>
    <div class="repfoot">Relatório gerado pelo PIED · Precificação Solar em ${geradoEm}. Valores em reais (R$). "Novo preço de venda" = Custo / (1 − Margem) / (1 − PIS/COFINS), reconstruído na data de cada alteração.</div>
  </div>`;
}

function exportarPdf(){
  const list=filteredChanges();
  if(!list.length){ toast("Nenhuma alteração no período/filtros selecionados.","err"); return; }
  document.getElementById("printArea").innerHTML=buildReportHtml(list);
  // dá um instante para o layout aplicar antes de abrir a impressão
  setTimeout(()=>window.print(), 60);
}

function healthFlag(it){
  const m=margemReal(it.custo, it.valorPlataforma);
  if(it.valorPlataforma==null||it.custo==null) return {cls:"",txt:"—",m:null};
  if(m<=CONFIG.TOLERANCIA_PREJUIZO) return {cls:"bad",txt:"Prejuízo",m};
  if(m < CONFIG.MARGEM_ALVO-0.001) return {cls:"warn",txt:"Abaixo do alvo",m};
  return {cls:"ok",txt:"Saudável",m};
}

function readForm(){
  const inner=$("#drawerInner");
  const custo=parseFloat($("#fCusto",inner).value);
  let margem=parseFloat($("#fMargem",inner).value)/100;
  if(!isNaN(margem)) margem=Math.round(margem*1e6)/1e6; // evita ruído de ponto flutuante
  const plat=parseFloat($("#fPlat",inner).value);
  const custoV=isNaN(custo)?null:custo, platV=isNaN(plat)?null:plat;
  // A margem gravada é sempre a margem REAL do preço na plataforma (quando há custo e preço).
  let margemV=isNaN(margem)?null:margem;
  const mr=margemReal(custoV,platV);
  if(mr!=null) margemV=Math.round(mr*1e6)/1e6;
  return {custo:custoV, margem:margemV, valorPlataforma:platV};
}

// ---- sincronização margem ⇄ preço (ancorada no custo) ----
const parseIn = sel => { const v=parseFloat($(sel).value); return isNaN(v)?null:v; };
function setVal(sel,num,dec){ const el=$(sel); if(el) el.value = (num==null)?"" : (Math.round(num*Math.pow(10,dec))/Math.pow(10,dec)); }

function syncFromCusto(){ // custo mudou: mantém o preço, atualiza a margem real
  const custo=parseIn("#fCusto"), preco=parseIn("#fPlat");
  const mr=margemReal(custo,preco);
  if(mr!=null) setVal("#fMargem", mr*100, 4);
  updateReadout();
}
function syncFromMargem(){ // margem digitada: calcula o preço sugerido e joga no preço
  const custo=parseIn("#fCusto"); let margem=parseIn("#fMargem");
  if(custo!=null && margem!=null && margem<100){
    const preco=vendaCalc(custo, margem/100);
    if(preco!=null) setVal("#fPlat", preco, 2);
  }
  updateReadout();
}
function syncFromPreco(){ // preço ajustado manualmente: recalcula a margem real
  const custo=parseIn("#fCusto"), preco=parseIn("#fPlat");
  const mr=margemReal(custo,preco);
  if(mr!=null) setVal("#fMargem", mr*100, 4);
  updateReadout();
}
function updateReadout(){
  let custo,margem,preco;
  if(state.user){
    custo=parseIn("#fCusto");
    const mp=parseIn("#fMargem"); margem = (mp==null)? null : mp/100;
    preco=parseIn("#fPlat");
  }else{
    custo=state.current.custo; margem=state.current.margem; preco=state.current.valorPlataforma;
  }
  const vc=vendaCalc(custo,margem);                 // preço sugerido pela margem
  const precoEfetivo = (preco!=null)? preco : vc;   // preço que de fato vale
  const base = (vc!=null)? vc : precoEfetivo;
  $("#dVenda").textContent=brl(base);
  $("#dPlat").textContent=brl(preco);
  if($("#dWp")) $("#dWp").textContent= base&&state.current.potenciaW? "R$ "+(base/state.current.potenciaW).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";
  if($("#dSemEx")) $("#dSemEx").textContent= base? brl(base*1.2):"—";
  // saúde: margem real do preço efetivo
  const m=margemReal(custo, precoEfetivo);
  const fill=$("#dFill"); const txt=$("#dHealthTxt");
  if(m==null){ fill.style.width="0%"; txt.className="flag"; txt.innerHTML=""; $("#dVenda").style.color="var(--ink)"; return; }
  const pctClamp=Math.max(0,Math.min(1,m/Math.max(CONFIG.MARGEM_ALVO,0.0001)));
  fill.style.width=(pctClamp*100).toFixed(0)+"%";
  let cls,label,color;
  if(m<=CONFIG.TOLERANCIA_PREJUIZO){cls="bad";label="Prejuízo";color="var(--red)";}
  else if(m<CONFIG.MARGEM_ALVO-0.001){cls="warn";label="Abaixo do alvo";color="var(--amber-deep)";}
  else {cls="ok";label="Saudável";color="var(--teal)";}
  fill.style.background=color;
  txt.className="flag "+cls; txt.innerHTML=`<span class="b"></span>Margem real: ${pct(m)} · ${label}`;
  $("#dVenda").style.color = m<=CONFIG.TOLERANCIA_PREJUIZO? "var(--red)":"var(--ink)";
}
function renderHistory(it){
  const host=$("#dHist"); const h=it.historico||[];
  if(!h.length){ host.innerHTML=`<p class="hempty">Sem alterações registradas ainda.</p>`; return; }
  const labelOf={custo:"Custo",margem:"Margem",valorPlataforma:"Preço plataforma"};
  host.innerHTML=h.map((e,i)=>{
    const isPct=e.campo==="margem";
    const de=isPct?pct(e.de):brl(e.de), para=isPct?pct(e.para):brl(e.para);
    return `<div class="hentry">
      <div class="tl"><span class="d"></span>${i<h.length-1?'<span class="ln"></span>':''}</div>
      <div class="ct"><div class="ch">${labelOf[e.campo]||e.campo}: <span class="from">${de}</span> → <span class="to">${para}</span></div>
      <div class="meta"><span>👤 ${esc(e.usuario)}</span><span>🕑 ${fmtDate(e.dataHora)}</span></div></div></div>`;
  }).join("");
}

async function saveDrawer(){
  const it=state.current; const f=readForm();
  if(f.custo==null){ toast("Informe um custo válido.","err"); return; }
  if(f.margem==null){ toast("Informe a margem ou o preço na plataforma.","err"); return; }
  if(f.margem>=1){ toast("Preço inconsistente para este custo.","err"); return; }
  const btn=$("#dSave"); btn.disabled=true; btn.textContent="Salvando…";
  try{
    const res=await API.updateCost({secao:state.section,codigo:it.codigo,custo:f.custo,margem:f.margem,valorPlataforma:f.valorPlataforma});
    if(!res.ok) throw new Error(res.error||"Falha ao salvar");
    Object.assign(it,res.item); // atualiza item local
    toast("Custo atualizado e registrado no histórico.","ok");
    renderChrome(); renderTable(); openDrawer(it);
  }catch(err){ toast(err.message||"Erro ao salvar","err"); btn.disabled=false; btn.textContent="Salvar alteração"; }
}

async function setHidden(secao,item,oculto,motivo){
  if(!state.user){ openLogin(); return; }
  const btn=$("#btnHide")||$("#btnShow");
  if(btn){ btn.disabled=true; btn.textContent=oculto?"Ocultando…":"Reexibindo…"; }
  try{
    const res=await API.setHidden({secao,codigo:item.codigo,oculto,motivo:motivo||""});
    if(!res.ok) throw new Error(res.error||"Falha ao atualizar a visibilidade");
    Object.assign(item,res.item);
    closeDrawer();
    toast(oculto?"Produto ocultado. Movido para “Ocultados”.":"Produto reexibido e de volta às listas.","ok");
    renderChrome(); renderTable();
  }catch(e){ toast(e.message||"Erro ao atualizar visibilidade","err");
    if(btn){ btn.disabled=false; btn.textContent=oculto?"🗄 Ocultar produto":"↩ Reexibir produto"; } }
}

function openLogin(){
  const sel=$("#loginUser");
  const users=(SEED.usuarios||[]).map(u=>u.nome);
  sel.innerHTML=users.length? users.map(n=>`<option>${esc(n)}</option>`).join("")
                            : `<option value="">(cadastre usuários na aba Usuarios)</option>`;
  $("#loginErr").classList.remove("show"); $("#loginPin").value="";

async function doLogin(){
  const nome=$("#loginUser").value, pin=$("#loginPin").value.trim();
  const err=$("#loginErr");
  if(!nome){ err.textContent="Selecione seu nome."; err.classList.add("show"); return; }
  const go=$("#loginGo"); go.disabled=true; go.textContent="Entrando…";
  try{
    const res=await API.login(nome,pin);
    if(!res.ok) throw new Error(res.error||"PIN incorreto.");
    state.user={nome:res.nome||nome}; state.pin=pin;
    $("#loginScrim").classList.remove("open");
    renderChrome(); if(state.current) openDrawer(state.current);
    toast(`Bem-vindo, ${state.user.nome}. Modo de edição ativo.`,"ok");
  }catch(e){ err.textContent=e.message; err.classList.add("show"); }
  finally{ go.disabled=false; go.textContent="Entrar"; }
}

// Sugere um código único a partir de um existente (base-COPIA, base-COPIA2, …)
function suggestCodigo(secao, base){
  const existing=new Set((state.data[secao]||[]).map(x=>String(x.codigo).trim()));
  const b=String(base||"").trim(); if(!b) return "";
  let cand=b+"-COPIA", n=2;
  while(existing.has(cand)){ cand=b+"-COPIA"+n; n++; }
  return cand;
}
function duplicarItem(it){
  if(!state.user){ openLogin(); return; }
  const secao=state.section;
  const pf={
    codigo: suggestCodigo(secao, it.codigo),
    custo: it.custo,
    margem: it.margem!=null ? Math.round(it.margem*1e6)/1e4 : "",
    valorPlataforma: it.valorPlataforma,
  };
  if(secao==="inversores"){ pf.modelo=it.modelo; pf.grupo=it.grupo; pf.valorPlataformaSemEX=it.valorPlataformaSemEX; }
  if(secao==="modulos"){ pf.modelo=it.modelo; pf.potenciaW=it.potenciaW; }
  if(secao==="miscelaneas"){ pf.nome=it.nome; pf.categoria=it.categoria; pf.observacao=it.observacao; }
  closeDrawer();
  openNewProduct(secao, pf, "Duplicar produto");
}

async function submitNewProduct(){
  const secao=$("#npSec").value; const err=$("#newErr");
  const nameKey = secao==="miscelaneas" ? "nome" : "modelo";
  const val=k=>{ const el=$("#np_"+k); return el?el.value.trim():""; };
  const numOf=k=>{ const v=val(k); if(v==="") return null; const n=parseFloat(v.replace(",",".")); return isNaN(n)?null:n; };

  const codigo=val("codigo");
  if(!codigo){ return showNewErr("Informe o código do produto."); }
  if((state.data[secao]||[]).some(x=>String(x.codigo).trim()===codigo)){
    return showNewErr(`Já existe um produto com o código ${codigo} em ${SECMETA[secao].label}.`);
  }
  const nome=val(nameKey);
  if(!nome){ return showNewErr("Informe o nome/modelo do produto."); }
  if(secao==="modulos" && numOf("potenciaW")==null){ return showNewErr("Informe a potência (Wp) do módulo."); }

  let margem = numOf("margem"); margem = (margem==null)? 0.25 : margem/100;
  if(margem>=1){ return showNewErr("Margem inválida (deve ser menor que 100%)."); }

  const produto={ codigo, custo:numOf("custo"), margem, valorPlataforma:numOf("valorPlataforma") };
  if(secao==="inversores"){ produto.modelo=nome; produto.grupo=val("grupo")||"INVERSORES"; produto.valorPlataformaSemEX=numOf("valorPlataformaSemEX"); }
  if(secao==="modulos"){ produto.modelo=nome; produto.potenciaW=numOf("potenciaW"); }
  if(secao==="miscelaneas"){ produto.nome=nome; produto.categoria=val("categoria")||"Outros"; produto.observacao=val("observacao"); }

  const go=$("#npGo"); go.disabled=true; go.textContent="Cadastrando…";
  try{
    const res=await API.createProduct({secao,produto});
    if(!res.ok) throw new Error(res.error||"Falha ao cadastrar");
    state.data[secao].push(res.item);
    $("#newScrim").classList.remove("open");
    state.section=secao; state.filter="Todos"; state.query=""; $("#search").value="";
    renderAll(); openDrawer(res.item);
    toast("Produto cadastrado com sucesso.","ok");
  }catch(e){ showNewErr(e.message||"Erro ao cadastrar"); }
  finally{ go.disabled=false; go.textContent="Cadastrar produto"; }
}
function showNewErr(msg){ const e=$("#newErr"); e.textContent=msg; e.classList.add("show"); }

/* ---------------- Toast ---------------- */
let toastT;
function toast(msg,kind="ok"){
  const t=$("#toast"); t.className="toast "+kind; t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),3200);
}

/* ---------------- search ---------------- */
$("#search").addEventListener("input",e=>{ state.query=e.target.value; renderTable(); });

/* ---------------- boot ---------------- */
(async function init(){
  $("#tablehost").innerHTML=`<div class="loader"><span class="spin"></span> Carregando preços…</div>`;
  try{ await API.load(); }
  catch(e){ $("#tablehost").innerHTML=`<div class="empty">Não foi possível carregar os dados.<br><small>${esc(e.message)}</small></div>`; renderChrome(); return; }
  state.live=!!CONFIG.API_URL;
  renderAll();
})();
</script>
</body>
</html>
